name: release

on:
  push:
    tags: ['v*']
  # Manual trigger so an already-created tag (e.g. v1.0.0, tagged before this
  # workflow existed) can still be published without a destructive re-tag.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        # `npm install` (not `npm ci`): the committed lockfile is generated on
        # Windows and omits Linux-only optional dep NODES (@emnapi/*, the rollup
        # wasm fallback referenced as edges) — a known npm cross-OS lockfile gap
        # that makes `npm ci`'s strict sync check fail. `npm install` honours the
        # lockfile for everything present and materialises the missing optionals.
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
